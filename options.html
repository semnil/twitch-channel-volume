<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Twitch Channel Volume — Settings</title>
  <style>
    :root {
      --bg: #18181b;
      --fg: #efeff1;
      --muted: #adadb8;
      --accent: #9147ff;
      --border: #2a2a2d;
    }
    body { margin: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--fg); }
    .wrap { max-width: 720px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 18px; margin: 0 0 16px; }
    h2 { font-size: 14px; margin: 24px 0 8px; }
    section { background: #1f1f23; border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; margin-bottom: 12px; }
    .row { display: flex; align-items: center; gap: 12px; margin: 8px 0; }
    .row label { width: 160px; color: var(--muted); }
    .row .desc { font-size: 12px; color: var(--muted); margin-left: 8px; }
    input[type="range"] { flex: 1; }
    input[type="number"] { width: 80px; background: #0e0e10; color: var(--fg); border: 1px solid var(--border); padding: 4px; }
    select { background: #0e0e10; color: var(--fg); border: 1px solid var(--border); padding: 4px; }
    button { background: var(--accent); color: #fff; border: 0; border-radius: 4px; padding: 6px 12px; cursor: pointer; }
    button.secondary { background: transparent; border: 1px solid var(--border); color: var(--fg); }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; }
    .right { text-align: right; }
    .empty { color: var(--muted); padding: 12px; text-align: center; }
    a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 data-i18n="extName">Twitch Channel Volume</h1>
    <section>
      <h2 data-i18n="settings">Settings</h2>
      <div class="row">
        <label data-i18n="targetLufs">Target LUFS</label>
        <input id="targetLufs" type="range" min="-30" max="-6" step="1" value="-18" />
        <span id="targetLufsValue">-18</span>
        <span class="desc" data-i18n="targetLufsDesc">基準値</span>
      </div>
      <div class="row">
        <label data-i18n="adGain">CM Gain</label>
        <input id="adGainDb" type="range" min="-24" max="6" step="1" value="-6" />
        <span id="adGainValue">-6 dB</span>
        <span class="desc" data-i18n="adGainDesc">CM 区間で適用する追加ゲイン</span>
      </div>
      <div class="row">
        <label data-i18n="displayUnit">表示単位</label>
        <select id="displayUnit">
          <option value="%">%</option>
          <option value="dB">dB</option>
        </select>
        <span class="desc" data-i18n="displayUnitDesc">ゲイン値の表示形式</span>
      </div>
    </section>
    <section>
      <h2 data-i18n="savedChannels">Saved Channels</h2>
      <table>
        <thead>
          <tr>
            <th data-i18n="colChannel">Channel</th>
            <th class="right" data-i18n="typeLive">Live</th>
            <th class="right" data-i18n="typeVod">VOD</th>
            <th class="right" data-i18n="typeClip">Clip</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="channelsBody"></tbody>
      </table>
      <div id="emptyMsg" class="empty" data-i18n="noSavedChannels">保存済みチャンネルなし</div>
      <div class="row right">
        <button id="clearAllBtn" class="secondary" data-i18n="clearAll">全削除</button>
      </div>
    </section>
  </div>
  <script src="utils.js"></script>
  <script src="options.js"></script>
</body>
</html>
